<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Energy Twin Dashboard</title>
    <style>
        /* CSS: ส่วนการตกแต่งหน้าตา */
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #0f172a; /* สีน้ำเงินเข้มแบบ Dark Mode */
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }
        h1 { margin-bottom: 30px; color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #334155;
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); border-color: #38bdf8; }

        .label { font-size: 0.9rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 2.5rem; font-weight: bold; margin: 10px 0; display: block; }
        .unit { font-size: 1rem; color: #64748b; }

        /* การเน้นสีเฉพาะส่วน */
        .power-value { color: #fbbf24; } /* สีเหลืองทอง */
        .cost-card { 
            grid-column: span 2; 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid #ef4444; 
        }
        .cost-value { color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
        .status-tag { font-size: 0.8rem; padding: 4px 12px; border-radius: 20px; background: #334155; margin-top: 10px; display: inline-block; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

    <h1>ENERGY MONITERING</h1>

    <div class="grid-container">
        <div class="card">
            <span class="label">แรงดันไฟฟ้า</span>
            <span class="value" id="v">0.0</span>
            <span class="unit">V (โวลต์)</span>
        </div>
        <div class="card">
            <span class="label">กำลังไฟฟ้า</span>
            <span class="value power-value" id="w">0</span>
            <span class="unit">W (วัตต์)</span>
        </div>
        <div class="card">
            <span class="label">กระแสไฟฟ้า</span>
            <span class="value" id="a">0.00</span>
            <span class="unit">A (แอมป์)</span>
        </div>
        <div class="card">
            <span class="label">พลังงานสะสม</span>
            <span class="value" id="kwh">0.0</span>
            <span class="unit">kWh (หน่วย)</span>
        </div>

        <div class="card cost-card">
            <span class="label">ประมาณการค่าไฟฟ้า (ประเภท 4.2.3)</span>
            <span class="value cost-value" id="cost">0.00</span>
            <span class="unit">บาท (รวม VAT 7% และ Ft แล้ว)</span>
            <div id="period" class="status-tag">กำลังตรวจสอบช่วงเวลา...</div>
        </div>
    </div>

    <script>
        // *** ใส่ Web App URL ที่คุณได้จาก Google Apps Script ตรงนี้ ***
        const API_URL = "https://script.google.com/macros/s/AKfycbxJnQ0WTaq4uqHAIDybejJGaQI7YbtSv91oA_9AxcONoZhXQtqMjNFnQnPNUiePF3Hh/exec?action=read";

        async function updateDashboard() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                // อัปเดตตัวเลขในหน้าเว็บ
                document.getElementById('v').innerText = parseFloat(data.v).toFixed(1);
                document.getElementById('w').innerText = parseInt(data.w);
                document.getElementById('a').innerText = parseFloat(data.a).toFixed(2);
                document.getElementById('kwh').innerText = parseFloat(data.kwh).toFixed(2);

                // --- ส่วนคำนวณค่าไฟตามประกาศมหาลัย ---
                const now = new Date();
                const day = now.getDay(); // 0=อาทิตย์, 1=จันทร์...
                const hour = now.getHours();
                
                // เช็ค On-Peak: จันทร์-ศุกร์ 09.00-22.00
                let isOnPeak = (day >= 1 && day <= 5 && hour >= 9 && hour < 22);
                
                let energyRate = isOnPeak ? 4.3297 : 2.6369; // อัตราค่าพลังงาน
                let ftRate = 0.3972; // ค่า Ft สมมติ (ปรับตามบิลจริงได้)
                
                let baseCost = data.kwh * (energyRate + ftRate);
                let totalWithVat = baseCost * 1.07; // บวก VAT 7%

                document.getElementById('cost').innerText = totalWithVat.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
                document.getElementById('period').innerText = isOnPeak ? "ช่วงเวลา: ON-PEAK (ค่าไฟสูง)" : "ช่วงเวลา: OFF-PEAK (ค่าไฟต่ำ)";
                document.getElementById('period').style.color = isOnPeak ? "#f87171" : "#4ade80";

            } catch (error) {
                console.error("ไม่สามารถดึงข้อมูลได้:", error);
            }
        }

        // ตั้งเวลาให้รีเฟรชข้อมูลทุกๆ 5 วินาที
        setInterval(updateDashboard, 5000);
        updateDashboard(); // เรียกใช้ครั้งแรกทันที
    </script>
</body>
</html>
