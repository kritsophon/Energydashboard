<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building 14 Energy Dashboard (Fixed Version)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Kanit', sans-serif; box-sizing: border-box; }
        body { background: #eef1f8; margin: 0; padding: 20px; color: #2c3e50; }
        .container { max-width: 1200px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 30px; }
        .header h1 { color: #1a2a6c; font-size: 1.8rem; margin: 0; }
        
        .time-filters { display: flex; gap: 8px; margin-top: 10px; }
        .time-filters button {
            background: white; border: 1px solid #dde2f0; padding: 8px 18px; 
            border-radius: 50px; cursor: pointer; font-weight: 600; color: #666;
            transition: all 0.25s ease; font-size: 0.85rem;
        }
        .time-filters button:hover { background: #f0f3ff; color: #1a2a6c; }
        .time-filters button.active { background: #1a2a6c; color: white; border-color: #1a2a6c; }

        .gauge-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        
        /* --- Custom Gauge Style --- */
        .gauge-box {
            background: linear-gradient(160deg, #1e3380 0%, #111d55 100%);
            border-radius: 24px;
            padding: 28px 20px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 16px 40px rgba(26,42,108,0.35);
            border: 1px solid rgba(255,255,255,0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .gauge-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 22px 48px rgba(26,42,108,0.45);
        }
        .gauge-box canvas { display: block; }
        .gauge-box .gauge-label {
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-top: 4px;
        }
        .gauge-box .gauge-value {
            color: #ffffff;
            font-size: 1.9rem;
            font-weight: 600;
            margin-top: 2px;
            letter-spacing: -0.01em;
            transition: color 0.4s ease;
        }

        .chart-section { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(26,42,108,0.07); margin-bottom: 30px; border: 1px solid rgba(26,42,108,0.06); }

        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .info-card {
            background: white; padding: 22px 24px; border-radius: 18px;
            border-left: 5px solid #1a2a6c;
            box-shadow: 0 4px 20px rgba(26,42,108,0.07);
            border-top: 1px solid rgba(26,42,108,0.06);
            border-right: 1px solid rgba(26,42,108,0.06);
            border-bottom: 1px solid rgba(26,42,108,0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .info-card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(26,42,108,0.12); }
        .info-card h4 { margin: 0; color: #9aa3b8; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
        .info-card .value { font-size: 2rem; font-weight: 600; color: #1a2a6c; margin: 6px 0 2px; letter-spacing: -0.02em; }

        .footer { text-align: center; margin-top: 40px; }
        .btn-sheet {
            display: inline-flex; align-items: center; gap: 10px; background: #1d8552; color: white;
            text-decoration: none; padding: 12px 30px; border-radius: 50px; font-weight: 600; transition: 0.3s;
        }
        .btn-sheet:hover { background: #156d41; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>Dashboard พลังงานอาคาร 14</h1>
            <p style="margin:0; color:#888;">ข้อมูลเรียลไทม์: พลังงานสะสม (kWh)</p>
        </div>
        <div class="time-filters">
            <button id="btn-live" onclick="updateChart('live')" class="active">Live</button>
            <button id="btn-1h" onclick="updateChart('1h')">1 ชม. </button>
            <button id="btn-1d" onclick="updateChart('1d')">1 วัน </button>
            <button id="btn-3d" onclick="updateChart('3d')">3 วัน </button>
        </div>
    </div>

    <div class="gauge-container">
        <div class="gauge-box">
            <canvas id="gauge-v" width="260" height="150"></canvas>
            <div class="gauge-label">Voltage (V)</div>
            <div class="gauge-value" id="val-v">0 V</div>
        </div>
        <div class="gauge-box">
            <canvas id="gauge-a" width="260" height="150"></canvas>
            <div class="gauge-label">Current (A)</div>
            <div class="gauge-value" id="val-a">0 A</div>
        </div>
        <div class="gauge-box">
            <canvas id="gauge-w" width="260" height="150"></canvas>
            <div class="gauge-label">Power (W)</div>
            <div class="gauge-value" id="val-w">0 W</div>
        </div>
    </div>

    <div class="summary-grid">
        <div class="info-card"><h4>พลังงานสะสมปัจจุบัน</h4><div class="value" id="val-kwh">0.00 kWh</div></div>
        <div class="info-card"><h4>ประมาณการค่าไฟ</h4><div class="value" id="val-cost">0.00 ฿</div><span id="period-status" style="font-size:0.8rem;">รอดึงข้อมูล...</span></div>
    </div>

    <div class="chart-section">
        <canvas id="energyChart"></canvas>
    </div>

    <div class="footer">
        <a id="sheetLink" href="https://docs.google.com/spreadsheets/d/13V_l5g3pDKz-OWspX_Nx9mA-TuYFOxcazD09t8IWKwU/edit" target="_blank" class="btn-sheet">
             📊 ดูฐานข้อมูล Google Sheet
        </a>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz9o3RVl7twEH8ubIO2ueURroOIfVNWxxRAzM4oaDwiQbIxqpmZSBB6mkL6ZS286lPN/exec";
    let allData = [];

    const gaugeConfigs = {
        'gauge-v': { min: 0, max: 300, valueEl: 'val-v', unit: 'V', color: '#5bc8f5' },
        'gauge-a': { min: 0, max: 100, valueEl: 'val-a', unit: 'A', color: '#7ed8a4' },
        'gauge-w': { min: 0, max: 20000, valueEl: 'val-w', unit: 'W', color: '#f5a05b' },
    };
    const gaugeValues = { 'gauge-v': 0, 'gauge-a': 0, 'gauge-w': 0 };
    const gaugeAnimFrames = {};

    const DPR = window.devicePixelRatio || 1;
    const CW = 260, CH = 150;

    function setupCanvas(id) {
        const canvas = document.getElementById(id);
        canvas.width = CW * DPR;
        canvas.height = CH * DPR;
        canvas.style.width = CW + 'px';
        canvas.style.height = CH + 'px';
        const ctx = canvas.getContext('2d');
        ctx.scale(DPR, DPR);
        return ctx;
    }

    const gaugeCtxs = {};
    Object.keys(gaugeConfigs).forEach(id => { gaugeCtxs[id] = setupCanvas(id); });

    function drawGauge(canvasId, value) {
        const ctx = gaugeCtxs[canvasId];
        if (!ctx) return;
        const cfg = gaugeConfigs[canvasId];
        const W = CW, H = CH;
        const cx = W / 2, cy = H - 10;
        const r = 96;
        const trackW = 13;

        ctx.clearRect(0, 0, W, H);

        const pct = Math.min(1, Math.max(0, (value - cfg.min) / (cfg.max - cfg.min)));
        const fillAngle = Math.PI * (1 - pct);

        // Outer dim ring
        ctx.beginPath();
        ctx.arc(cx, cy, r + trackW * 0.5 + 2, Math.PI, 0, false);
        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Track background
        ctx.beginPath();
        ctx.arc(cx, cy, r, Math.PI, 0, false);
        ctx.strokeStyle = 'rgba(255,255,255,0.10)';
        ctx.lineWidth = trackW;
        ctx.lineCap = 'round';
        ctx.stroke();

        // Track fill with glow
        if (pct > 0.005) {
            ctx.save();
            ctx.shadowColor = cfg.color;
            ctx.shadowBlur = 14;
            ctx.beginPath();
            ctx.arc(cx, cy, r, Math.PI, fillAngle, false);
            ctx.strokeStyle = cfg.color;
            ctx.lineWidth = trackW;
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.restore();
        }

        // Tick marks
        const numTicks = 10;
        for (let i = 0; i <= numTicks; i++) {
            const a = Math.PI * (1 - i / numTicks);
            const isMajor = i % 5 === 0;
            const innerR = r - (isMajor ? 18 : 10);
            const outerR = r - trackW * 0.5 - 2;
            const x1 = cx + outerR * Math.cos(a), y1 = cy - outerR * Math.sin(a);
            const x2 = cx + innerR * Math.cos(a), y2 = cy - innerR * Math.sin(a);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = isMajor ? 'rgba(255,255,255,0.55)' : 'rgba(255,255,255,0.25)';
            ctx.lineWidth = isMajor ? 1.5 : 1;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        // Min / Max labels
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.font = '600 10px Kanit, sans-serif';
        ctx.textAlign = 'center';
        const lblR = r - trackW * 0.5 - 24;
        const minX = cx + lblR * Math.cos(Math.PI), minY = cy - lblR * Math.sin(Math.PI);
        const maxX = cx + lblR * Math.cos(0), maxY = cy - lblR * Math.sin(0);
        ctx.fillText(cfg.min.toString(), minX + 10, minY + 4);
        ctx.fillText(cfg.max >= 1000 ? (cfg.max / 1000) + 'k' : cfg.max.toString(), maxX - 10, maxY + 4);

        // Needle shadow
        const needleAngle = fillAngle;
        const tipX = cx + (r - 14) * Math.cos(needleAngle);
        const tipY = cy - (r - 14) * Math.sin(needleAngle);
        const bW = 6;
        const b1X = cx + bW * Math.cos(needleAngle + Math.PI / 2);
        const b1Y = cy - bW * Math.sin(needleAngle + Math.PI / 2);
        const b2X = cx + bW * Math.cos(needleAngle - Math.PI / 2);
        const b2Y = cy - bW * Math.sin(needleAngle - Math.PI / 2);

        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 8;
        ctx.shadowOffsetX = 1;
        ctx.shadowOffsetY = 2;
        ctx.beginPath();
        ctx.moveTo(tipX, tipY);
        ctx.lineTo(b1X, b1Y);
        ctx.lineTo(b2X, b2Y);
        ctx.closePath();
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.restore();

        // Pivot outer
        ctx.beginPath();
        ctx.arc(cx, cy, 9, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.fill();
        // Pivot inner
        ctx.beginPath();
        ctx.arc(cx, cy, 5, 0, Math.PI * 2);
        ctx.fillStyle = cfg.color;
        ctx.fill();
    }

    function animateGaugeTo(canvasId, targetValue) {
        const cfg = gaugeConfigs[canvasId];
        if (gaugeAnimFrames[canvasId]) cancelAnimationFrame(gaugeAnimFrames[canvasId]);
        const startVal = gaugeValues[canvasId];
        const startDisplay = startVal;
        const duration = 1400;
        const startTime = performance.now();

        function easeOutExpo(t) { return t === 1 ? 1 : 1 - Math.pow(2, -10 * t); }

        function step(now) {
            const t = Math.min(1, (now - startTime) / duration);
            const eased = easeOutExpo(t);
            const val = startVal + (targetValue - startVal) * eased;
            drawGauge(canvasId, val);

            const valEl = document.getElementById(cfg.valueEl);
            if (valEl) {
                const display = val >= 1000 ? Math.round(val).toLocaleString() : parseFloat(val).toFixed(1);
                valEl.innerText = display + ' ' + cfg.unit;
            }

            if (t < 1) {
                gaugeAnimFrames[canvasId] = requestAnimationFrame(step);
            } else {
                gaugeValues[canvasId] = targetValue;
            }
        }
        requestAnimationFrame(step);
    }

    Object.keys(gaugeConfigs).forEach(id => drawGauge(id, 0));

    // --- Chart.js ---
    const ctx2 = document.getElementById('energyChart').getContext('2d');
    const energyChart = new Chart(ctx2, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'พลังงานสะสม (kWh)', data: [], borderColor: '#1d8552', backgroundColor: 'rgba(29, 133, 82, 0.1)', fill: true, tension: 0.4 }] },
        options: {
            responsive: true,
            plugins: {
                title: { display: true, text: 'กราฟแสดงการใช้พลังงาน (Energy Usage)', font: { size: 18, family: 'Kanit' } },
                legend: { position: 'bottom' }
            },
            scales: {
                x: { title: { display: true, text: 'เวลา (Time)', font: { weight: 'bold' } } },
                y: { beginAtZero: false, title: { display: true, text: 'หน่วย (kWh)', font: { weight: 'bold' } } }
            }
        }
    });

    // --- Fetch Data ---
    async function fetchData() {
        try {
            const response = await fetch(APPS_SCRIPT_URL + "?action=read");
            const data = await response.json();
            allData = data.history;
            const latest = data.latest;

            animateGaugeTo('gauge-v', latest.v);
            animateGaugeTo('gauge-a', latest.a);
            animateGaugeTo('gauge-w', latest.w);

            document.getElementById('val-kwh').innerText = parseFloat(latest.kwh).toFixed(2) + " kWh";

            let now = new Date();
            let isOnPeak = (now.getHours() >= 9 && now.getHours() < 22);
            let cost = latest.kwh * ((isOnPeak ? 4.32 : 2.63) + 0.39) * 1.07;
            document.getElementById('val-cost').innerText = cost.toLocaleString(undefined, {minimumFractionDigits:2}) + " ฿";

            const statusEl = document.getElementById('period-status');
            statusEl.innerText = "ช่วงเวลา: " + (isOnPeak ? "ON-PEAK" : "OFF-PEAK");
            statusEl.style.color = isOnPeak ? "#e74c3c" : "#2ecc71";

            const activeBtn = document.querySelector('.time-filters button.active').id;
            const mode = activeBtn.replace('btn-', '');
            updateChart(mode, false);

        } catch (e) {
            console.error("Fetch Error:", e);
            document.getElementById('period-status').innerText = "⚠️ การเชื่อมต่อข้อมูลขัดข้อง";
        }
    }

    // --- Update Chart ---
    function updateChart(timeframe, changeBtn = true) {
        if (changeBtn) {
            document.querySelectorAll('.time-filters button').forEach(btn => btn.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
        }
        if (!allData || allData.length === 0) return;

        const now = new Date();
        const todayStr = now.toDateString();
        let filteredData = allData;

        if (timeframe === 'live' || timeframe === '1h') {
            filteredData = allData.filter(d => new Date(d.time).toDateString() === todayStr);
        }

        let limit = 60; let step = 1;
        if (timeframe === 'live') { limit = 12; step = 1; }
        else if (timeframe === '1h') { limit = 60; step = 5; }
        else if (timeframe === '1d') { limit = 1440; step = 60; }
        else if (timeframe === '3d') { limit = 4320; step = 180; }

        let rawSlice = filteredData.slice(-limit);
        let displayData = [];
        for (let i = 0; i < rawSlice.length; i += step) {
            displayData.push(rawSlice[i]);
        }

        energyChart.data.labels = displayData.map(d => {
            const dateObj = new Date(d.time);
            if (isNaN(dateObj)) return "??:??";
            if (timeframe === 'live' || timeframe === '1h') {
                return dateObj.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            } else {
                return dateObj.toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit' }) +
                       " " + dateObj.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            }
        });

        energyChart.data.datasets[0].data = displayData.map(d => d.kwh);
        energyChart.update('none');
    }

    fetchData();
    setInterval(fetchData, 60000);
</script>

</body>
</html>
