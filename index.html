<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building 14 Smart Gauge Dashboard</title>
    <script src="https://cdn.rawgit.com/Mikhus/canvas-gauges/master/gauge.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Kanit', sans-serif; box-sizing: border-box; }
        body { background: #f4f7f6; margin: 0; padding: 20px; color: #2c3e50; }
        .container { max-width: 1200px; margin: auto; text-align: center; }
        
        .header { margin-bottom: 40px; }
        .header h1 { color: #1a2a6c; font-size: 2.2rem; margin-bottom: 10px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        
        /* Layout การจัดวางเกจ */
        .gauge-container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 30px; 
            margin-bottom: 40px; 
        }
        .gauge-box { 
            background: white; 
            padding: 30px 20px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
            flex: 1;
            min-width: 320px;
            max-width: 380px;
        }
        .gauge-box:hover { transform: translateY(-10px); }
        .label { font-size: 1.4rem; font-weight: 600; margin-top: -20px; color: #34495e; }

        /* สรุปค่าด้านล่าง */
        .summary-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; 
            margin-bottom: 40px; 
        }
        .info-card { 
            background: #ffffff; 
            padding: 25px; 
            border-radius: 20px; 
            border-left: 8px solid #1a2a6c;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            text-align: left;
        }
        .info-card h4 { margin: 0; color: #7f8c8d; font-size: 0.9rem; text-transform: uppercase; }
        .info-card .value { font-size: 2.2rem; font-weight: 600; color: #1a2a6c; margin: 5px 0; }
        #period-status { font-weight: bold; padding: 4px 12px; border-radius: 5px; font-size: 0.9rem; }

        /* Footer & Link */
        .footer { margin-top: 50px; }
        .btn-sheet {
            display: inline-flex; align-items: center; gap: 12px;
            background: #1d8552; color: white; text-decoration: none;
            padding: 15px 35px; border-radius: 50px; font-weight: 600;
            transition: 0.3s; box-shadow: 0 10px 20px rgba(29, 133, 82, 0.3);
        }
        .btn-sheet:hover { background: #156d41; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Building 14 Energy Dashboard</h1>
        <p>Real-time Monitoring | KU Smart Campus</p>
    </div>

    <div class="gauge-container">
        <div class="gauge-box">
            <canvas id="gauge-v"></canvas>
            <div class="label">Voltage (V)</div>
        </div>
        <div class="gauge-box">
            <canvas id="gauge-a"></canvas>
            <div class="label">Current (A)</div>
        </div>
        <div class="gauge-box">
            <canvas id="gauge-w"></canvas>
            <div class="label">Power (W)</div>
        </div>
    </div>

    <div class="summary-grid">
        <div class="info-card">
            <h4>Total Energy</h4>
            <div class="value" id="val-kwh">0.0 <span style="font-size:1.2rem;">kWh</span></div>
        </div>
        <div class="info-card">
            <h4>Estimated Cost</h4>
            <div class="value" id="val-cost">0.00 <span style="font-size:1.2rem;">฿</span></div>
            <span id="period-status" style="background:#eee;">รอดึงข้อมูล...</span>
        </div>
    </div>

    <div class="footer">
        <a href="https://docs.google.com/spreadsheets/d/13V_l5g3pDKz-OWspX_Nx9mA-TuYFOxcazD09t8IWKwU/edit?gid=0#gid=0" target="_blank" class="btn-sheet">
            <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M15,9V3.5L18.5,7H15V9M6,20V4H13V8H17V20H6M8,12H16V14H8V12M8,16H16V18H8V16Z"/></svg>
            ดูฐานข้อมูลอ้างอิง (Google Sheet)
        </a>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxR_U0VKyROaGE_locdROC8TgzftrUQsJghvbDEOsJjVmwU70tyhVXmVkezPzdy8la9/exec";

    // การตั้งค่าหน้าปัดเกจ (Common Settings)
    const gaugeLayout = {
        width: 320, height: 320,
        type: "radial-gauge",
        startAngle: 90, ticksAngle: 180, // ทำให้เป็นครึ่งวงกลมแบบในรูป
        colorPlate: "#fff", borderShadowWidth: 0, borders: false,
        needleType: "arrow", needleWidth: 3,
        needleCircleSize: 7, needleCircleOuter: true, needleCircleInner: false,
        animationDuration: 1500, animationRule: "decelerate",
        valueBox: true, valueInt: 1, valueDec: 1
    };

    // 1. เกจ Voltage (0-300V)
    var gaugeV = new RadialGauge({
        ...gaugeLayout, renderTo: 'gauge-v', units: "Volts",
        minValue: 0, maxValue: 300,
        majorTicks: ["0","50","100","150","200","250","300"],
        highlights: [
            { "from": 0, "to": 180, "color": "#f1c40f" },   // ต่ำเกิน (เหลือง)
            { "from": 180, "to": 240, "color": "#2ecc71" }, // ปกติ (เขียว)
            { "from": 240, "to": 300, "color": "#e74c3c" }  // สูงเกิน (แดง)
        ]
    }).draw();

    // 2. เกจ Current (0-100A) - ปรับตามความเหมาะสมของตึก
    var gaugeA = new RadialGauge({
        ...gaugeLayout, renderTo: 'gauge-a', units: "Amps",
        minValue: 0, maxValue: 100,
        majorTicks: ["0","20","40","60","80","100"],
        highlights: [
            { "from": 0, "to": 60, "color": "#2ecc71" },   // ปกติ (เขียว)
            { "from": 60, "to": 85, "color": "#f1c40f" },  // เริ่มเยอะ (เหลือง)
            { "from": 85, "to": 100, "color": "#e74c3c" }  // ใกล้ตัด (แดง)
        ]
    }).draw();

    // 3. เกจ Power (0-20,000W)
    var gaugeW = new RadialGauge({
        ...gaugeLayout, renderTo: 'gauge-w', units: "Watts",
        minValue: 0, maxValue: 20000,
        majorTicks: ["0","5k","10k","15k","20k"],
        highlights: [
            { "from": 0, "to": 12000, "color": "#2ecc71" },
            { "from": 12000, "to": 17000, "color": "#f1c40f" },
            { "from": 17000, "to": 20000, "color": "#e74c3c" }
        ]
    }).draw();

    async function fetchData() {
        try {
            const response = await fetch(scriptURL + "?action=read");
            const data = await response.json();
            const latest = data.latest;

            // อัปเดตเข็มเกจ
            gaugeV.value = latest.v;
            gaugeA.value = latest.a;
            gaugeW.value = latest.w;

            // อัปเดตตัวเลข kWh
            document.getElementById('val-kwh').innerHTML = latest.kwh.toLocaleString() + ' <span style="font-size:1.2rem;">kWh</span>';
            
            // คำนวณค่าไฟแบบ TOU
            let now = new Date();
            let day = now.getDay(); 
            let hour = now.getHours();
            let isOnPeak = (day >= 1 && day <= 5 && hour >= 9 && hour < 22);
            let rate = isOnPeak ? 4.3297 : 2.6369;
            let totalCost = latest.kwh * (rate + 0.3972) * 1.07;
            
            document.getElementById('val-cost').innerHTML = totalCost.toLocaleString(undefined, {minimumFractionDigits: 2}) + ' <span style="font-size:1.2rem;">฿</span>';
            
            const statusEl = document.getElementById('period-status');
            statusEl.innerText = isOnPeak ? "● ช่วงเวลา: ON-PEAK (ค่าไฟสูง)" : "● ช่วงเวลา: OFF-PEAK (ค่าไฟถูก)";
            statusEl.style.color = isOnPeak ? "#e74c3c" : "#2ecc71";

        } catch (e) { console.error("Data Fetch Error:", e); }
    }

    fetchData();
    setInterval(fetchData, 60000); // อัปเดตข้อมูลทุก 1 นาที
</script>

</body>
</html>
